version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: photo-postgres
    environment:
      POSTGRES_PASSWORD: mypassword123
      POSTGRES_DB: photos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: photo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: photo-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:mypassword123@postgres:5432/photos_db
      MONGO_URL: mongodb://mongo:27017
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    volumes:
      - ./sample_photos:/app/sample_photos

volumes:
  postgres_data:
  mongo_data: